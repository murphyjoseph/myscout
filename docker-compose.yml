services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: myscout-postgres
    environment:
      POSTGRES_USER: myscout
      POSTGRES_PASSWORD: myscout
      POSTGRES_DB: myscout
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
